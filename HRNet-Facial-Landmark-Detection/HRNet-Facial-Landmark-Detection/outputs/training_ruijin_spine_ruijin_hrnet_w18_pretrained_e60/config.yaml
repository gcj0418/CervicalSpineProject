AUTO_RESUME: false
CUDNN:
  BENCHMARK: true
  DETERMINISTIC: false
  ENABLED: true
DATASET:
  DATASET: RUIJIN
  FLIP: false
  ROOT: ../D-CeLR
  ROT_FACTOR: 10
  SCALE_FACTOR: 0.15
  TESTSET: ../D-CeLR/data/ruijin_npy_direct/test.txt
  TRAINSET: ../D-CeLR/data/ruijin_npy_direct/train.txt
GPUS:
- 0
LOG_DIR: HRNet-Facial-Landmark-Detection/outputs
MODEL:
  EXTRA:
    FINAL_CONV_KERNEL: 1
    PRETRAINED_LAYERS:
    - '*'
    STAGE2:
      BLOCK: BASIC
      FUSE_METHOD: SUM
      NUM_BLOCKS:
      - 4
      - 4
      NUM_BRANCHES: 2
      NUM_CHANNELS:
      - 18
      - 36
      NUM_MODULES: 1
    STAGE3:
      BLOCK: BASIC
      FUSE_METHOD: SUM
      NUM_BLOCKS:
      - 4
      - 4
      - 4
      NUM_BRANCHES: 3
      NUM_CHANNELS:
      - 18
      - 36
      - 72
      NUM_MODULES: 4
    STAGE4:
      BLOCK: BASIC
      FUSE_METHOD: SUM
      NUM_BLOCKS:
      - 4
      - 4
      - 4
      - 4
      NUM_BRANCHES: 4
      NUM_CHANNELS:
      - 18
      - 36
      - 72
      - 144
      NUM_MODULES: 3
    STEM_INPLANES: 64
    WITH_HEAD: true
  HEATMAP_SIZE:
  - 64
  - 64
  IMAGE_SIZE:
  - 256
  - 256
  INIT_WEIGHTS: true
  NAME: hrnet
  NUM_JOINTS: 52
  PRETRAINED: models/HRNet_W18_C_pretrained.pth
  SIGMA: 2.0
  TARGET_TYPE: Gaussian
OUTPUT_DIR: HRNet-Facial-Landmark-Detection/outputs
PIN_MEMORY: true
PRINT_FREQ: 20
TEST:
  BATCH_SIZE_PER_GPU: 4
TRAIN:
  BATCH_SIZE_PER_GPU: 4
  BEGIN_EPOCH: 0
  CHECKPOINT: ''
  END_EPOCH: 60
  LR: 0.0001
  LR_FACTOR: 0.1
  LR_STEP:
  - 30
  - 50
  MOMENTUM: 0.0
  NESTEROV: false
  OPTIMIZER: adam
  RESUME: false
  SHUFFLE: true
  WD: 0.0
WORKERS: 0
